name: "IMU Complementary Filter (AST Root Elim)"
formula: >
  If[c >= 0,
    rt(2, (c/rt(2, a^2 + b^2 + c^2) + 1) * 0.5),
    (-b/rt(2, a^2 + b^2 + c^2)) / (2.0 * rt(2, (1 - c/rt(2, a^2 + b^2 + c^2)) * 0.5))
  ] < t && -1 < a < 1 && -1 < b < 1 && -1 < c < 1
vars: [t, a, b, c]
filename: "imu_comp_filter"
mc_formula: >
  np.where(c >= 0,
    np.sqrt((c / np.sqrt(a**2 + b**2 + c**2) + 1) * 0.5),
    (-b / np.sqrt(a**2 + b**2 + c**2)) / (2.0 * np.sqrt((1 - c / np.sqrt(a**2 + b**2 + c**2)) * 0.5)))
mc_bounds:
  a: [-1, 1]
  b: [-1, 1]
  c: [-1, 1]
