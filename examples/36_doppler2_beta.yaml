name: "Doppler 2 (Beta 2,2)"
formula: "(-(3314/10 + (6/10)*T) * v) / ((3314/10 + (6/10)*T + u)^2) < t && -125 < u < 125 && 15 < v < 25000 && -40 < T < 60"
vars: [t, u, v, T]
filename: "doppler2_beta"
distributions:
  u: { type: beta, params: [2, 2, -125, 125] }
  v: { type: beta, params: [2, 2, 15, 25000] }
  T: { type: beta, params: [2, 2, -40, 60] }
mc_formula: "(-(331.4 + 0.6*T) * v) / ((331.4 + 0.6*T + u)**2)"
mc_bounds:
  u: [-125, 125]
  v: [15, 25000]
  T: [-40, 60]
