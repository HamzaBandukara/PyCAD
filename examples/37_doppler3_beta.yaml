name: "Doppler 3 (Beta 2,2)"
formula: "(-(3314/10 + (6/10)*T) * v) / ((3314/10 + (6/10)*T + u)^2) < t && -30 < u < 120 && 320 < v < 20300 && -50 < T < 30"
vars: [t, u, v, T]
filename: "doppler3_beta"
distributions:
  u: { type: beta, params: [2, 2, -30, 120] }
  v: { type: beta, params: [2, 2, 320, 20300] }
  T: { type: beta, params: [2, 2, -50, 30] }
mc_formula: "(-(331.4 + 0.6*T) * v) / ((331.4 + 0.6*T + u)**2)"
mc_bounds:
  u: [-30, 120]
  v: [320, 20300]
  T: [-50, 30]
