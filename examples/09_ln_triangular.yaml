name: "Paper Example 5 (Ln Approximation - Triangular)"
formula: "(1/5)*((x - 1)^5) - (1/4)*((x - 1)^4) + (1/3)*((x - 1)^3) - (1/2)*((x - 1)^2) + x - 1 < t && 0 < x < 1"
vars: [t, x]
filename: "ln_approx_5_tri"
distributions:
  x: { type: triangular, params: [0, 1, 0.5] }
mc_formula: "(1/5)*((x - 1)**5) - (1/4)*((x - 1)**4) + (1/3)*((x - 1)**3) - (1/2)*((x - 1)**2) + x - 1"
mc_bounds:
  x: [0, 1]
