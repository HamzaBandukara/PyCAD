name: "x_by_xy (Triangular)"
formula: "x/(x+y) < t && 1 < x < 4 && 1 < y < 4"
vars: [t, x, y]
filename: "x_by_xy_tri"
t_min: 0.1
t_max: 0.9
distributions:
  x: { type: triangular, params: [1, 4, 2.5] }
  y: { type: triangular, params: [1, 4, 2.5] }
mc_formula: "x / (x + y)"
mc_bounds:
  x: [1, 4]
  y: [1, 4]
