name: "Doppler Effect (Test 2)"
formula: "(-(3314/10 + (6/10)*T) * v) / ((3314/10 + (6/10)*T + u)^2) < t && -125 < u < 125 && 15 < v < 25000 && -40 < T < 60"
vars: [t, u, v, T]
