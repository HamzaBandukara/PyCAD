name: "Sum (Beta 2,2)"
formula: "1 < x < 2 && 1 < y < 2 && 1 < z < 2 && x + y + z < t"
vars: [t, x, y, z]
filename: "sum_beta"
distributions:
  x: { type: beta, params: [2, 2, 1, 2] }
  y: { type: beta, params: [2, 2, 1, 2] }
  z: { type: beta, params: [2, 2, 1, 2] }
mc_formula: "x + y + z"
mc_bounds:
  x: [1, 2]
  y: [1, 2]
  z: [1, 2]
